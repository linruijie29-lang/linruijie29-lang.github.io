<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richard Lin | 林睿捷 — BTE @ NYU Stern</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #1a1714;
            --cream: #f5f0e8;
            --gold: #b08d57;
            --up-green: #4caf50;
            --down-red: #f44336;
        }

        body {
            margin: 0;
            background: var(--cream);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            padding-top: 30px; /* Space for ticker */
        }

        /* NASDAQ STYLE TICKER */
        .market-ticker {
            position: fixed;
            top: 0;
            width: 100%;
            height: 30px;
            background: var(--ink);
            color: #fff;
            z-index: 1000;
            overflow: hidden;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--gold);
            font-size: 11px;
            letter-spacing: 0.1em;
        }

        .ticker-move {
            display: flex;
            white-space: nowrap;
            animation: scroll 30s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            padding: 0 25px;
            display: flex;
            gap: 8px;
        }

        .price.up { color: var(--up-green); }
        .price.down { color: var(--down-red); }

        /* NAV & TOGGLE */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 2rem 5%;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 12px;
            transition: 0.3s;
        }

        .lang-btn:hover {
            background: var(--gold);
            color: white;
        }

        /* HERO SECTION */
        .hero {
            padding: 5% 10%;
            text-align: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .bio {
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="market-ticker">
        <div class="ticker-move" id="ticker-content">
            <span class="ticker-item">LOADING MARKET DATA...</span>
        </div>
    </div>

    <nav>
        <div class="logo" data-en="Richard Lin" data-zh="林睿捷">Richard Lin</div>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">中文</button>
    </nav>

    <section class="hero">
        <h1 data-en="Bridging Finance & Technology" data-zh="连接金融与科技">
            Bridging Finance & Technology
        </h1>
        <p class="bio" data-en="I am a freshman in the BTE program at NYU Stern, exploring the intersection of algorithmic trading, fintech, and venture capital." 
                       data-zh="我是纽约大学斯特恩商学院 BTE 项目的大一学生，致力于探索算法交易、金融科技和风险投资的交汇点。">
            I am a freshman in the BTE program at NYU Stern, exploring the intersection of algorithmic trading, fintech, and venture capital.
        </p>
    </section>

    <script>
        // --- 1. LANGUAGE TOGGLE LOGIC ---
        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            
            // Update all elements with data attributes
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });

            // Update button text
            document.getElementById('langBtn').innerText = currentLang === 'en' ? '中文' : 'English';
        }

        // --- 2. LIVE MARKET DATA (FINNHUB API) ---
        // Get your FREE key at https://finnhub.io/
        const API_KEY = 'd7prruhr01qosaapodr0d7prruhr01qosaapodrg'; 
        const SYMBOLS = ['QQQ', 'SPY', 'NVDA', 'BTC/USD', 'AAPL', 'TSLA'];

        async function fetchPrices() {
            const tickerContainer = document.getElementById('ticker-content');
            let htmlContent = '';

            try {
                const requests = SYMBOLS.map(symbol => 
                    fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol.includes('/') ? symbol : symbol}&token=${API_KEY}`)
                );

                const responses = await Promise.all(requests);
                const data = await Promise.all(responses.map(r => r.json()));

                data.forEach((stock, index) => {
                    const symbol = SYMBOLS[index];
                    const price = stock.c.toFixed(2);
                    const change = stock.dp.toFixed(2);
                    const isUp = change >= 0;

                    const item = `
                        <div class="ticker-item">
                            <span>${symbol}</span>
                            <span class="price ${isUp ? 'up' : 'down'}">
                                $${price} (${isUp ? '+' : ''}${change}%)
                            </span>
                        </div>
                    `;
                    htmlContent += item;
                });

                // Repeat twice for seamless loop
                tickerContainer.innerHTML = htmlContent + htmlContent;

            } catch (error) {
                console.error("Error fetching market data:", error);
                tickerContainer.innerHTML = '<span class="ticker-item">MARKET DATA TEMPORARILY UNAVAILABLE</span>';
            }
        }

        // Initial fetch and set refresh every 60 seconds
        if(API_KEY !== 'd7prruhr01qosaapodr0d7prruhr01qosaapodrg') {
            fetchPrices();
            setInterval(fetchPrices, 60000); 
        } else {
            // Fallback for demo if no API key is provided
            document.getElementById('ticker-content').innerHTML = `
                <div class="ticker-item">NASDAQ <span class="price up">18,230.40 (+1.2%)</span></div>
                <div class="ticker-item">S&P 500 <span class="price up">5,240.10 (+0.8%)</span></div>
                <div class="ticker-item">NVDA <span class="price up">894.10 (+2.4%)</span></div>
                <div class="ticker-item">BTC <span class="price down">$68,432 (-0.5%)</span></div>
            `.repeat(3);
        }
    </script>
</body>
</html>
