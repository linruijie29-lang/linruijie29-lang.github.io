<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richard Lin — BTE @ NYU Stern</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5f0e8;
  font-family: 'DM Sans', sans-serif;
  color: #1a1714;
}

/* NAV */
nav {
  position: fixed;
  top: 28px;
  width: 100%;
  padding: 15px 40px;
  background: rgba(245,240,232,0.9);
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}

/* TICKER */
.ticker-wrap {
  position: fixed;
  top: 0;
  width: 100%;
  background: #222;
  color: white;
  overflow: hidden;
  padding: 6px 0;
}

.ticker {
  display: flex;
  gap: 40px;
  animation: scroll 25s linear infinite;
}

@keyframes scroll {
  0% {transform: translateX(0);}
  100% {transform: translateX(-50%);}
}

/* SECTIONS */
section {
  padding: 100px 40px;
}

#hero {
  margin-top: 100px;
}

/* PORTFOLIO */
input, button {
  padding: 8px;
  margin: 5px;
}

button {
  cursor: pointer;
}

.green { color: #4caf84; }
.red { color: #e05555; }

</style>
</head>

<body>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker" id="stockTicker">Loading market...</div>
</div>

<!-- NAV -->
<nav>
  <div>Richard Lin</div>
  <button onclick="toggleLang()">中文 / EN</button>
</nav>

<!-- HERO -->
<section id="hero">
  <h1 data-key="title">Richard Lin</h1>
  <p data-key="bio">
    NYU Stern — Business, Technology & Entrepreneurship
  </p>
</section>

<!-- PORTFOLIO -->
<section>
  <h2>Portfolio</h2>

  <input id="symbol" placeholder="Symbol">
  <input id="shares" type="number" placeholder="Shares">
  <input id="buyPrice" type="number" placeholder="Buy Price">
  <button onclick="addStock()">Add</button>

  <div id="portfolioList"></div>
  <h3 id="portfolioTotal"></h3>
</section>

<script>
const API_KEY = "YOUR_API_KEY_HERE";

// ===== LANGUAGE =====
let lang = "en";

const translations = {
  en: {
    title: "Richard Lin",
    bio: "NYU Stern — Business, Technology & Entrepreneurship"
  },
  zh: {
    title: "林睿杰",
    bio: "纽约大学斯特恩商学院 — 商业、技术与创业"
  }
};

function toggleLang() {
  lang = lang === "en" ? "zh" : "en";
  document.querySelectorAll("[data-key]").forEach(el => {
    el.textContent = translations[lang][el.dataset.key];
  });
}

// ===== WEBSOCKET =====
const socket = new WebSocket(`wss://ws.finnhub.io?token=${API_KEY}`);
const symbols = ["AAPL","TSLA","MSFT","NVDA"];
let prices = {};

socket.addEventListener("open", () => {
  symbols.forEach(s => {
    socket.send(JSON.stringify({type:"subscribe", symbol:s}));
  });
});

socket.addEventListener("message", msg => {
  const data = JSON.parse(msg.data);

  if (data.data) {
    data.data.forEach(trade => {
      prices[trade.s] = trade.p;
    });

    renderTicker();
    renderPortfolio();
  }
});

function renderTicker() {
  let html = "";

  symbols.forEach(s => {
    const price = prices[s] || 0;
    html += `<span>${s}: $${price.toFixed(2)}</span>`;
  });

  document.getElementById("stockTicker").innerHTML = html + html;
}

// ===== PORTFOLIO =====
let portfolio = JSON.parse(localStorage.getItem("portfolio") || "[]");

function addStock() {
  const symbol = document.getElementById("symbol").value.toUpperCase();
  const shares = parseFloat(document.getElementById("shares").value);
  const buyPrice = parseFloat(document.getElementById("buyPrice").value);

  if (!symbol || !shares || !buyPrice) return;

  portfolio.push({symbol, shares, buyPrice});
  localStorage.setItem("portfolio", JSON.stringify(portfolio));

  renderPortfolio();
}

function renderPortfolio() {
  const list = document.getElementById("portfolioList");
  list.innerHTML = "";

  let totalValue = 0;
  let totalCost = 0;

  portfolio.forEach(p => {
    const current = prices[p.symbol] || p.buyPrice;

    const value = current * p.shares;
    const cost = p.buyPrice * p.shares;
    const pnl = value - cost;

    totalValue += value;
    totalCost += cost;

    const color = pnl >= 0 ? "green" : "red";

    list.innerHTML += `
      <div>
        ${p.symbol} | ${p.shares} shares |
        $${current.toFixed(2)} |
        <span class="${color}">
          P&L: $${pnl.toFixed(2)}
        </span>
      </div>
    `;
  });

  const totalPnL = totalValue - totalCost;

  document.getElementById("portfolioTotal").innerHTML = `
    Total: $${totalValue.toFixed(2)} |
    <span class="${totalPnL >= 0 ? "green" : "red"}">
      P&L: $${totalPnL.toFixed(2)}
    </span>
  `;
}

renderPortfolio();
</script>

</body>
</html>
