<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #00ffcc;
  font-family: "Courier New", monospace;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
  border-bottom: 1px solid #00ffcc;
}

button {
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  padding: 5px 10px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: calc(100vh - 50px);
}

.panel {
  padding: 10px;
  border-right: 1px solid #00ffcc;
  overflow-y: auto;
}

h2 {
  margin-top: 0;
  color: #00ffff;
}

input {
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  padding: 5px;
  margin-right: 5px;
}

.green { color: #00ff00; }
.red { color: #ff3333; }
</style>
</head>

<body>

<header>
  <span data-key="title">TERMINAL</span>
  <button onclick="toggleLang()">中文 / EN</button>
</header>

<div class="container">

<!-- MARKET -->
<div class="panel">
  <h2 data-key="market">MARKET</h2>
  <div id="market"></div>
</div>

<!-- PORTFOLIO -->
<div class="panel">
  <h2 data-key="portfolio">PORTFOLIO</h2>

  <div>
    <input id="symbol" placeholder="Symbol">
    <input id="shares" type="number" placeholder="Shares">
    <input id="price" type="number" placeholder="Buy Price">
    <button onclick="addStock()">ADD</button>
  </div>

  <div id="portfolio"></div>
  <h3 id="total"></h3>
</div>

</div>

<script>
const API_KEY = "YOUR_API_KEY_HERE";

// ===== LANGUAGE =====
let lang = "en";

const t = {
  en: {
    title: "TERMINAL",
    market: "MARKET",
    portfolio: "PORTFOLIO"
  },
  zh: {
    title: "终端",
    market: "市场",
    portfolio: "投资组合"
  }
};

function toggleLang() {
  lang = lang === "en" ? "zh" : "en";
  document.querySelectorAll("[data-key]").forEach(el => {
    el.textContent = t[lang][el.dataset.key];
  });
}

// ===== MARKET (WEBSOCKET) =====
const socket = new WebSocket(`wss://ws.finnhub.io?token=${API_KEY}`);

const symbols = ["AAPL","TSLA","MSFT","NVDA"];
let prices = {};

socket.addEventListener("open", () => {
  symbols.forEach(s => {
    socket.send(JSON.stringify({type:"subscribe", symbol:s}));
  });
});

socket.addEventListener("message", msg => {
  const data = JSON.parse(msg.data);
  if (data.data) {
    data.data.forEach(trade => {
      prices[trade.s] = trade.p;
    });
    renderMarket();
    renderPortfolio();
  }
});

function renderMarket() {
  const div = document.getElementById("market");
  div.innerHTML = "";

  for (let s of symbols) {
    const price = prices[s] || 0;
    div.innerHTML += `<div>${s}: $${price.toFixed(2)}</div>`;
  }
}

// ===== PORTFOLIO =====
let portfolio = JSON.parse(localStorage.getItem("portfolio") || "[]");

function addStock() {
  const symbol = document.getElementById("symbol").value.toUpperCase();
  const shares = parseFloat(document.getElementById("shares").value);
  const price = parseFloat(document.getElementById("price").value);

  if (!symbol || !shares || !price) return;

  portfolio.push({symbol, shares, price});
  localStorage.setItem("portfolio", JSON.stringify(portfolio));

  renderPortfolio();
}

function renderPortfolio() {
  const div = document.getElementById("portfolio");
  div.innerHTML = "";

  let totalValue = 0;
  let totalCost = 0;

  portfolio.forEach((p, i) => {
    const current = prices[p.symbol] || p.price;
    const value = current * p.shares;
    const cost = p.price * p.shares;
    const pnl = value - cost;

    totalValue += value;
    totalCost += cost;

    const color = pnl >= 0 ? "green" : "red";

    div.innerHTML += `
      <div>
        ${p.symbol} | ${p.shares} shares | 
        $${current.toFixed(2)} |
        <span class="${color}">
          P&L: $${pnl.toFixed(2)}
        </span>
      </div>
    `;
  });

  const totalPnL = totalValue - totalCost;
  const totalColor = totalPnL >= 0 ? "green" : "red";

  document.getElementById("total").innerHTML = `
    Total: $${totalValue.toFixed(2)} |
    <span class="${totalColor}">
      P&L: $${totalPnL.toFixed(2)}
    </span>
  `;
}

renderPortfolio();
</script>

</body>
</html>
